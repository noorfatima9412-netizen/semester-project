<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Pharmacy Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">💊 <span>Pharmacy</span> Management</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="login.html" class="active">Login</a></li>
    </ul>
  </nav>

  <div class="container">
    <h1 class="page-title" style="text-align: center;">Login / Register</h1>
    <div id="message" class="alert hidden"></div>

    <div class="form-box">
      <div class="tabs">
        <button class="tab-btn active" onclick="showTab('login')">Login</button>
        <button class="tab-btn" onclick="showTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <form id="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-username" required placeholder="Enter username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" required placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="hidden">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" required placeholder="Choose username">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" required placeholder="Choose password">
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="reg-role">
            <option value="staff">Staff / Cashier</option>
            <option value="admin">Admin / Pharmacist</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
      </form>
    </div>
  </div>

  <footer class="footer">
    <p>Pharmacy Management System &copy; 2026</p>
  </footer>

  <script src="api.js"></script>
  <script>
    function showTab(tab) {
      document.getElementById("login-form").classList.toggle("hidden", tab !== "login");
      document.getElementById("register-form").classList.toggle("hidden", tab !== "register");
      document.querySelectorAll(".tab-btn").forEach(function(btn, i) {
        btn.classList.toggle("active", (tab === "login" && i === 0) || (tab === "register" && i === 1));
      });
    }

    // If already logged in, go to dashboard
    if (getToken()) {
      window.location.href = "dashboard.html";
    }

    document.getElementById("login-form").addEventListener("submit", async function(e) {
      e.preventDefault();
      try {
        const data = await apiCall("/auth/login", "POST", {
          username: document.getElementById("login-username").value,
          password: document.getElementById("login-password").value
        });
        saveToken(data.access_token, data.username, data.role);
        showMessage("message", "Login successful! Redirecting...", "success");
        setTimeout(function() { window.location.href = "dashboard.html"; }, 1000);
      } catch (err) {
        showMessage("message", err.message, "error");
      }
    });

    document.getElementById("register-form").addEventListener("submit", async function(e) {
      e.preventDefault();
      try {
        const data = await apiCall("/auth/register", "POST", {
          username: document.getElementById("reg-username").value,
          email: document.getElementById("reg-email").value,
          password: document.getElementById("reg-password").value,
          role: document.getElementById("reg-role").value
        });
        saveToken(data.access_token, data.username, data.role);
        showMessage("message", "Registration successful! Redirecting...", "success");
        setTimeout(function() { window.location.href = "dashboard.html"; }, 1000);
      } catch (err) {
        showMessage("message", err.message, "error");
      }
    });
  </script>
</body>
</html>
