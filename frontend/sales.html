<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales - Pharmacy Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">💊 <span>Pharmacy</span> Management</div>
    <ul class="nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="medicines.html">Medicines</a></li>
      <li><a href="customers.html">Customers</a></li>
      <li><a href="sales.html" class="active">Sales</a></li>
      <li><a href="prescriptions.html">Prescriptions</a></li>
      <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
  </nav>

  <div class="container">
    <h1 class="page-title">Sales & Billing</h1>
    <div id="message" class="alert hidden"></div>

    <div class="form-box" style="max-width: 100%;">
      <h2 style="margin-bottom: 1rem; color: var(--secondary);">Create New Sale</h2>
      <form id="sale-form">
        <div class="form-row">
          <div class="form-group">
            <label>Customer</label>
            <select id="customer_id" required>
              <option value="">Select customer</option>
            </select>
          </div>
          <div class="form-group">
            <label>Medicine</label>
            <select id="medicine_id" required>
              <option value="">Select medicine</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Quantity</label>
          <input type="number" id="quantity_sold" required min="1" value="1">
        </div>
        <button type="submit" class="btn btn-primary">Create Sale</button>
      </form>
    </div>

    <h2 class="page-title">Sales History</h2>
    <div class="table-box">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Customer</th>
            <th>Medicine</th>
            <th>Qty</th>
            <th>Total</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="sales-table">
          <tr><td colspan="7" style="text-align:center;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <footer class="footer">
    <p>Pharmacy Management System &copy; 2026</p>
  </footer>

  <script src="api.js"></script>
  <script>
    requireLogin();

    async function loadDropdowns() {
      try {
        const customers = await apiCall("/customers/");
        const medicines = await apiCall("/medicines/");

        const custSelect = document.getElementById("customer_id");
        customers.forEach(function(c) {
          const opt = document.createElement("option");
          opt.value = c.id;
          opt.textContent = c.name + " (" + c.phone + ")";
          custSelect.appendChild(opt);
        });

        const medSelect = document.getElementById("medicine_id");
        medicines.forEach(function(m) {
          const opt = document.createElement("option");
          opt.value = m.id;
          opt.textContent = m.name + " - " + formatPrice(m.price) + " (Stock: " + m.quantity + ")";
          medSelect.appendChild(opt);
        });
      } catch (err) {
        showMessage("message", err.message, "error");
      }
    }

    function renderSales(sales) {
      const tbody = document.getElementById("sales-table");
      if (sales.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No sales yet</td></tr>';
        return;
      }
      tbody.innerHTML = sales.map(function(s) {
        return '<tr>' +
          '<td>' + s.id + '</td>' +
          '<td>' + (s.customer_name || s.customer_id) + '</td>' +
          '<td>' + (s.medicine_name || s.medicine_id) + '</td>' +
          '<td>' + s.quantity_sold + '</td>' +
          '<td>' + formatPrice(s.total_price) + '</td>' +
          '<td>' + formatDate(s.sale_date) + '</td>' +
          '<td><button class="btn btn-sm btn-danger" onclick="deleteSale(' + s.id + ')">Delete</button></td>' +
        '</tr>';
      }).join('');
    }

    async function loadSales() {
      try {
        const sales = await apiCall("/sales/");
        renderSales(sales);
      } catch (err) {
        showMessage("message", err.message, "error");
      }
    }

    document.getElementById("sale-form").addEventListener("submit", async function(e) {
      e.preventDefault();
      try {
        await apiCall("/sales/", "POST", {
          customer_id: parseInt(document.getElementById("customer_id").value),
          medicine_id: parseInt(document.getElementById("medicine_id").value),
          quantity_sold: parseInt(document.getElementById("quantity_sold").value)
        });
        showMessage("message", "Sale created successfully! Stock updated.", "success");
        document.getElementById("sale-form").reset();
        loadDropdowns();
        loadSales();
      } catch (err) {
        showMessage("message", err.message, "error");
      }
    });

    async function deleteSale(id) {
      if (!confirm("Delete this sale record?")) return;
      try {
        await apiCall("/sales/" + id, "DELETE");
        showMessage("message", "Sale deleted!", "success");
        loadSales();
      } catch (err) {
        showMessage("message", err.message, "error");
      }
    }

    loadDropdowns();
    loadSales();
  </script>
</body>
</html>
